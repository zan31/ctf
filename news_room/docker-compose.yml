services:
  web:
    build: .
    container_name: news-room-web
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-newsroom}
      DB_USER: ${DB_USER:-newsroom}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src

  db:
    image: postgres:15
    container_name: news-room-db
    environment:
      POSTGRES_DB: ${DB_NAME:-newsroom}
      POSTGRES_USER: ${DB_USER:-newsroom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
